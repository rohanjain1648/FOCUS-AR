
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusAR - ADHD Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #020617;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
    }
    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    .ar-glass {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(200%); }
    }
    @keyframes glitch {
      0%, 100% { transform: translate(0); filter: none; }
      15% { transform: translate(-2px, 1px); filter: hue-rotate(5deg) contrast(1.1); }
      30% { transform: translate(1px, -2px); filter: none; }
      45% { transform: translate(-1px, 2px); filter: hue-rotate(-5deg) saturate(1.2); }
      60% { transform: translate(2px, -1px); filter: contrast(1.2); }
      75% { transform: translate(-1px, -1px); filter: none; }
      90% { transform: translate(1px, 1px); filter: brightness(1.1); }
    }
    @keyframes noise {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -5%); }
      20% { transform: translate(-10%, 5%); }
      30% { transform: translate(5%, -10%); }
      40% { transform: translate(-5%, 15%); }
      50% { transform: translate(-10%, 5%); }
      60% { transform: translate(15%, 0); }
      70% { transform: translate(0, 10%); }
      80% { transform: translate(-15%, 0); }
      90% { transform: translate(10%, 5%); }
    }
    @keyframes alert-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; filter: drop-shadow(0 0 10px #ef4444); }
    }
    @keyframes ripple-expand {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; border-width: 4px; }
      100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 1px; }
    }
    .animate-scan {
      animation: scan 4s linear infinite;
    }
    .animate-glitch {
      animation: glitch 0.3s steps(1) infinite;
    }
    .animate-alert {
      animation: alert-pulse 1s ease-in-out infinite;
    }
    .animate-ripple {
      animation: ripple-expand 1.2s cubic-bezier(0, 0, 0.2, 1) forwards;
    }
    .animate-noise {
      animation: noise 0.2s steps(1) infinite;
    }
    .hud-ring {
      border: 2px dashed rgba(56, 189, 248, 0.3);
      border-radius: 50%;
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
